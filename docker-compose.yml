
services:
  postgres:
    image: pgvector/pgvector:pg17-bookworm
    container_name: veridion_postgres
    restart: always
    environment:
      POSTGRES_USER: veridion_admin
      POSTGRES_PASSWORD: secure_flow_password
      POSTGRES_DB: veridion_compliance
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veridion_admin -d veridion_compliance"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - veridion_net

  redis:
    image: redis:7-alpine
    container_name: veridion_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - veridion_net

volumes:
  postgres_data:

networks:
  veridion_net:
    driver: bridge